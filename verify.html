<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Verify Action - DebugOTP</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
  :root{--bg:#070707;--p:#c0142a;--s:#e8193a}
  body{font-family:'Outfit',sans-serif;background-color:var(--bg);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;overflow:hidden;}
  body::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(192, 20, 42,0.1) 0%,transparent 70%);top:-200px;left:-200px;z-index:-1;}
  body::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(232,25,58,0.06) 0%,transparent 70%);bottom:-100px;right:-100px;z-index:-1;}
  
  .glass-card{background:rgba(255,255,255,0.015);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.045);box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);}
  .inp{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.05);color:#fff;transition:all 0.3s;outline:none;}
  .inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(192, 20, 42,0.15);}
  .btn-p{background:linear-gradient(135deg,var(--p),var(--s));transition:all 0.3s;}
  .btn-p:hover{box-shadow:0 10px 20px -10px var(--p);transform:translateY(-1px);}
  .btn-p:active{transform:translateY(1px);}
  
  .toast{position:fixed;top:20px;right:20px;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;transform:translateY(-100px);opacity:0;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);z-index:9999;box-shadow:0 10px 25px -5px rgba(0,0,0,0.3);display:flex;align-items:center;gap:10px;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.ok{background:rgba(34,197,94,0.1);color:#4ade80;border:1px solid rgba(34,197,94,0.2);}
  .toast.err{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);}

  .loader{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-radius:50%;border-top-color:var(--p);animation:spin 1s ease-in-out infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
 </style>
  <script src="/security.js"></script>
</head>
<body>

 <div id="toast" class="toast"></div>

 <div class="glass-card rounded-3xl p-8 md:p-10 w-full max-w-md mx-4 relative overflow-hidden">
  <!-- Brand -->
  <div class="text-center mb-8">
   <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl mb-4" style="background:linear-gradient(135deg,rgba(192, 20, 42,0.15),rgba(232,25,58,0.1));border:1px solid rgba(255,255,255,0.05);">
    <i class="fas fa-shield-halved text-xl" style="color:var(--p)"></i>
   </div>
   <h2 class="text-2xl font-bold tracking-tight">DebugOTP</h2>
   <p class="text-white/40 text-sm mt-1" id="subtext">Secure Authentication</p>
  </div>

  <!-- Loading State -->
  <div id="loadingState" class="flex flex-col items-center justify-center py-8 hidden">
   <div class="loader mb-5"></div>
   <p class="text-white/60 text-sm font-medium animate-pulse" id="loadingTxt">Verifying your request...</p>
  </div>

  <!-- Error State -->
  <div id="errorState" class="text-center py-6 hidden">
   <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4 text-red-400 text-2xl border border-red-500/20">
    <i class="fas fa-triangle-exclamation"></i>
   </div>
   <h3 class="text-lg font-bold mb-2">Invalid or Expired Link</h3>
   <p class="text-white/40 text-sm mb-6" id="errorTxt">The link you clicked is no longer valid. Please request a new one.</p>
   <button onclick="window.location.href='/'" class="btn-p w-full py-3 rounded-xl text-sm font-bold text-white shadow-lg">Return to Login</button>
  </div>

  <!-- Success State -->
  <div id="successState" class="text-center py-6 hidden">
   <div class="w-16 h-16 rounded-full bg-green-500/10 flex items-center justify-center mx-auto mb-4 text-green-400 text-2xl border border-green-500/20">
    <i class="fas fa-check"></i>
   </div>
   <h3 class="text-lg font-bold mb-2" id="successTitle">Verification Complete</h3>
   <p class="text-white/40 text-sm mb-6" id="successTxt">Your action has been completed successfully.</p>
   <button onclick="window.location.href='/'" class="btn-p w-full py-3 rounded-xl text-sm font-bold text-white shadow-lg">Continue to App</button>
  </div>

  <!-- Reset Password Form -->
  <div id="resetForm" class="hidden">
   <h3 class="text-lg font-bold mb-5 text-center">Reset Password</h3>
   <div class="space-y-4 mb-6">
    <div>
     <label class="block text-[11px] font-semibold text-white/40 uppercase tracking-wider mb-2">New Password</label>
     <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-lock text-white/20 text-sm"></i></div>
      <input type="password" id="newPwd" class="w-full pl-10 pr-10 py-3 rounded-xl inp text-sm" placeholder="••••••••">
      <button onclick="togglePwd('newPwd', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-white/30 hover:text-white transition"><i class="fas fa-eye text-sm"></i></button>
     </div>
    </div>
   </div>
   <button id="savePwdBtn" onclick="saveNewPassword()" class="btn-p w-full py-3.5 rounded-xl text-sm font-bold text-white shadow-lg flex items-center justify-center">
    Save Password <i class="fas fa-arrow-right ml-2 text-xs opacity-70"></i>
   </button>
  </div>

 </div>

 <script>
  function toast(m,t='err'){const e=document.getElementById('toast');e.className='toast '+t;e.innerHTML=`<i class="fas fa-${t==='ok'?'check-circle':'exclamation-circle'}"></i> `+m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),4000)}
  function show(id){['loadingState','errorState','successState','resetForm'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
  function togglePwd(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.innerHTML=`<i class="fas fa-eye${i.type==='text'?'-slash':''} text-sm"></i>`}

  // Parse URL Parameters
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode');
  const oobCode = params.get('oobCode');
  const apiKey = params.get('apiKey');

  window.onload = async () => {
   if (!mode || !oobCode || !apiKey) {
    show('errorState');
    document.getElementById('errorTxt').textContent = 'Missing required URL parameters.';
    return;
   }

   if (mode === 'resetPassword') {
    document.getElementById('subtext').textContent = 'Create a new password';
    show('resetForm');
   } 
   else if (mode === 'verifyEmail') {
    document.getElementById('subtext').textContent = 'Email Verification';
    show('loadingState');
    document.getElementById('loadingTxt').textContent = 'Verifying your email address...';
    await verifyEmailAction();
   } 
   else {
    show('errorState');
    document.getElementById('errorTxt').textContent = 'Invalid request mode.';
   }
  };

  async function verifyEmailAction() {
   try {
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${apiKey}`, {
     method: 'POST',
     headers: { 'Content-Type': 'application/json' },
     body: JSON.stringify({ oobCode: oobCode })
    });
    const data = await res.json();
    
    if (data.error) throw new Error(data.error.message);
    
    document.getElementById('successTitle').textContent = 'Email Verified!';
    document.getElementById('successTxt').textContent = 'Your email address has been successfully verified. You can now login.';
    show('successState');
   } catch (e) {
    show('errorState');
    document.getElementById('errorTxt').textContent = e.message.replace(/_/g, ' ') || 'The verification link is invalid or has expired.';
   }
  }

  async function saveNewPassword() {
   const pwd = document.getElementById('newPwd').value;
   if (!pwd) return toast('Please enter a new password');
   if (pwd.length < 6) return toast('Password must be at least 6 characters');

   const btn = document.getElementById('savePwdBtn');
   btn.disabled = true;
   btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';

   try {
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key=${apiKey}`, {
     method: 'POST',
     headers: { 'Content-Type': 'application/json' },
     body: JSON.stringify({ oobCode: oobCode, newPassword: pwd })
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    document.getElementById('successTitle').textContent = 'Password Reset!';
    document.getElementById('successTxt').textContent = 'Your password has been changed successfully. You can now login.';
    show('successState');
   } catch (e) {
    show('errorState');
    document.getElementById('errorTxt').textContent = e.message.replace(/_/g, ' ') || 'The reset link is invalid or has expired.';
   }
  }
 </script>
</body>
</html>
