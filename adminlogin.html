<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — DebugOTP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{font-family:'DM Sans',system-ui,sans-serif}
body{background:#070707}
.bg-mesh{position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(192, 20, 42,.06),transparent),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(239,68,68,.04),transparent)}
.card-glass{background:rgba(17,17,17,.8);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(20px)}
.input-f{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;transition:all .3s}
.input-f:focus{outline:none;border-color:#c0142a;box-shadow:0 0 0 3px rgba(192, 20, 42,.1)}
.btn-admin{background:linear-gradient(135deg,#c0142a,#e8193a);transition:all .4s}
.btn-admin:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(192, 20, 42,.3)}
</style>
  <script src="/security.js"></script>
</head>
<body class="text-white min-h-screen flex items-center justify-center">
<div class="bg-mesh"></div>
<div class="relative z-10 w-full max-w-[400px] p-4" id="container">
 <div class="text-center mb-8" id="logo">
  <div class="w-16 h-16 mx-auto mb-5 rounded-2xl flex items-center justify-center" style="background:linear-gradient(135deg,#c0142a,#e8193a);box-shadow:0 0 30px rgba(192, 20, 42,.3)">
   <i class="fas fa-shield-halved text-white text-xl"></i>
  </div>
  <h1 class="text-2xl font-bold mb-1">Admin Console</h1>
  <p class="text-white/35 text-sm">Restricted access only</p>
 </div>
 <div class="card-glass rounded-2xl p-7" id="form">
  <div class="mb-5">
   <label class="block text-xs font-medium text-white/50 mb-2 uppercase tracking-wider">Username</label>
   <input type="text" id="adminUsername" class="w-full px-4 py-3 rounded-xl input-f text-sm" placeholder="admin@bd">
  </div>
  <div class="mb-7">
   <label class="block text-xs font-medium text-white/50 mb-2 uppercase tracking-wider">Password</label>
   <div class="relative">
    <input type="password" id="adminPassword" class="w-full px-4 py-3 rounded-xl input-f text-sm pr-12" placeholder="••••••••">
    <button type="button" onclick="const i=document.getElementById('adminPassword');i.type=i.type==='password'?'text':'password'" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition"><i class="fas fa-eye text-sm"></i></button>
   </div>
  </div>
  <button onclick="handleLogin()" class="btn-admin w-full py-3 rounded-xl font-semibold text-sm text-white"><i class="fas fa-lock mr-2"></i>Access Console</button>
  <p class="text-center mt-5"><a href="/" class="text-white/30 hover:text-white/60 text-xs transition">← Back to Home</a></p>
 </div>
</div>
<script>
// Removed automatic redirect to prevent loops when server session is cleared

async function handleLogin(){
 const u=document.getElementById('adminUsername').value,p=document.getElementById('adminPassword').value;
 if(!u||!p)return;
 try{
  const r=await fetch('https://debugotp.onrender.com/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await r.json();
  if(d.success){localStorage.setItem('adminToken',d.token);gsap.to('#container',{y:-20,opacity:0,duration:.4,onComplete:()=>window.location.href = '/admin/dashboard'})}
  else alert('Invalid credentials');
 }catch(e){alert('Network error')}
}
document.getElementById('adminPassword').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin()});
gsap.from('#logo',{y:-30,opacity:0,duration:.7,ease:'power3.out'});
gsap.from('#form',{y:30,opacity:0,duration:.7,delay:.2,ease:'power3.out'});
</script>
</body>
</html>
